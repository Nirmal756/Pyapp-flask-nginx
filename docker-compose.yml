services:
  flask_app:
    build: .
    env_file:
      - .env
    environment:
      - GIT_BRANCH=${GIT_BRANCH}
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/project.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8090:80"
    depends_on:
      - flask_app
    restart: always
