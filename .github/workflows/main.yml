name: CI/CD for Pyapp

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

jobs:
  run-simulation:
    runs-on: [self-hosted, python-app-runner]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Production Env File
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "${{ secrets.ENV_PROD_CONTENT }}" > .env.prod
            echo "TARGET_ENV=.env.prod" >> $GITHUB_ENV
          else
            echo "${{ secrets.ENV_DEV_CONTENT }}" > .env.dev
            echo "TARGET_ENV=.env.dev" >> $GITHUB_ENV
          fi
      - name: Building compose
        run: |
          set -a
          source ./${{ env.TARGET_ENV }}
          set +a

          ENV_FILE=${{ env.TARGET_ENV }} docker compose up -d --build
