name: CI/CD for Pyapp

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

jobs:
  run-simulation:
    runs-on: [self-hosted, python-app-runner]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Building compose
        run: |

          if [ "${{ github.ref_name }}" == "main" ]; then
            export GIT_BRANCH="${{ vars.ENV_PROD_BRANCH }}"
          else
            export GIT_BRANCH="${{ vars.ENV_DEV_BRANCH }}"
          fi

          docker compose up -d --build
