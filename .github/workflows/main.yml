name: CI/CD for Pyapp

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

jobs:
  run-simulation:
    runs-on: [self-hosted, python-app-runner]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Create .env
        run: |
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
              echo "${{ secrets.DEV_ENV }}" > .env
          else
              echo "${{ secrets.PROD_ENV }}" > .env
          fi

      - name: Show
        run: cat .env

      - name: Building compose
        run: |
          docker compose up -d --build
      - name: Slack Notify
        if: always()
        run: |
          # Set variables based on job status
          if [[ "${{ job.status }}" == "success" ]]; then
            COLOR="#2EB67D"
            ICON="✅"
            STATUS="Success"
          else
            COLOR="#E01E5A"
            ICON="❌"
            STATUS="Failed"
          fi
          # Construct the JSON payload
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "attachments": [
              {
                "color": "'"$COLOR"'",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "'"$ICON"' *Deployment '"$STATUS"'* | *Build:* #${{ github.run_number }}"
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "📂 *Repository:* ${{ github.repository }}\n🌿 *Branch:* `${{ github.ref_name }}`\n👤 *Actor:* ${{ github.actor }}\n⚙️ *Event:* `${{ github.event_name }}`"
                    }
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": { "type": "plain_text", "text": "🔍 View Logs" },
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      }
                    ]
                  }
                ]
              }
            ]
          }' ${{ secrets.SLACK_WEBHOOK }}

