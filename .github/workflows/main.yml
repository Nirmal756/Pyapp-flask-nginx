name: CI/CD for Pyapp

on:
  push:
    branches: ["dev", "main"]
  workflow_dispatch:

jobs:
  run-simulation:
    runs-on: [self-hosted, python-app-runner]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Create .env
        run: |
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
              # Use a default if the secret is empty for some reason
              echo "${{ secrets.DEV_ENV }}" | tr -d '\r' > .env
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${{ secrets.PROD_ENV }}" | tr -d '\r' > .env
          fi

          if [ ! -s .env ]; then
            echo "ERROR: .env file is empty! Check your GitHub Secrets."
            exit 1
          fi

          export $(cat .env | xargs)
      - name: Show
        run: cat .env

      - name: Compose down
        run: |
          docker compose down

      - name: Docker prune
        run: |
          docker system prune -a

      - name: Building compose
        run: |
          docker compose up -d --build
