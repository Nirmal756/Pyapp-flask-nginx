<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Environment | Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Container & Glass Card */
        .dashboard-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 32px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            transition: transform 0.3s ease;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.4);
        }

        /* UI Elements */
        .badge {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.description {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 2.5rem;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            display: block;
        }

        .branch-name {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: 600;
        }

        /* Interactive Button */
        .btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            background: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        /* Live Clock pulse */
        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 0 rgba(16, 185, 129, 0.4);
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.7); }
            100% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <div class="badge">System Online</div>
        <h1>Deployment Node</h1>
        <p class="description">Enterprise Containerized Flask Instance</p>

        <div class="info-box">
            <span class="label">Active Git Branch</span>
            <div class="branch-name" id="branchDisplay">{{ branch }}</div>
        </div>

        <button class="btn" onclick="showStatus()">Check System Health</button>

        <div style="margin-top: 2rem; font-size: 0.8rem; color: var(--text-dim);">
            <span class="pulse"></span> Server Time: <span id="clock">--:--:--</span>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT --- */
        
        // 1. Live Clock Functionality
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Interactive Status Alert
        function showStatus() {
            const branch = document.getElementById('branchDisplay').innerText;
            alert(`System Diagnostic:\n\nNode: Nginx Reverse Proxy\nBranch: ${branch}\nStatus: Healthy 100%`);
        }

        // 3. Subtle background movement effect
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelector('.dashboard-card').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body>
</html>
